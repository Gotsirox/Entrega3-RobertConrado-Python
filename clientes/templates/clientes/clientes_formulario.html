<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="bg-primary text-white py-3 mb-4">
        <nav class="container">
            <div class="row g-5 text-center ">
                <div class="col-sm-6 col-md-8 ">
                    <ul class="nav justify-content-center">
                        <li class="nav-item"><a class="nav-link fs-5  text-white" aria-current="page" href="{% url "inicio" %}">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link fs-5 fw-bold text-white" href="{% url "form" %}">Crear Cliente</a></li>
                        <li class="nav-item"><a class="nav-link fs-5 text-white" href="{% url "listado" %}">Ver Clientes</a></li>
                    </ul>
                </div>
                <div class="col-6 col-md-4">
                    <p class="align-bottom">{{date_time}}</p>
                </div>
            </div>
        </nav>
    </header>

    <form action="{% url "form" %}" method="post" >
        {% csrf_token %}
        {{formulario}}
        <input type="submit" value="Crear Cliente"></input>
    </form>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
